services:
  - type: web
    name: pocketbuddy-server
    env: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: CLIENT_URL
        fromService:
          type: web
          name: pocketbuddy-client
          property: url

  - type: web
    name: pocketbuddy-client
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: pocketbuddy-server
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
